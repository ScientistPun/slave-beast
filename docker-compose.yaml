# 奴隶兽团队 - 单容器部署配置
version: '3.8'

services:
  slave-beast:
    build: .
    container_name: slave-beast
    # 共享宿主机网络，使用宿主机IP
    network_mode: "host"
    # 端口映射
    ports:
      - "3000:3000"   # WebSocket服务端口
      - "6379:6379"   # Redis端口
    # 保持容器后台运行
    tty: true
    stdin_open: true
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
    # 启动命令
    command: >
      bash -c "
        /usr/local/bin/start.sh
        tail -f /dev/null
      "
    # 重启策略
    restart: unless-stopped
    # 挂载必要目录
    volumes:
      - ./claude:/app/.claude
      - ./workspace:/app/workspace
    working_dir: /app
