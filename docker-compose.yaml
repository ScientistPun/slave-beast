# 奴隶兽团队 - 单容器部署配置
version: '3.8'

services:
  slave-beast:
    build: .
    container_name: slave-beast
    # 共享宿主机网络，使用宿主机IP
    network_mode: "host"
    # 保持容器后台运行
    tty: true
    stdin_open: true
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - PORT=3000
    # 重启策略
    restart: unless-stopped
    # 挂载必要目录
    volumes:
      - ./.claude:/app/.claude
      - ./workspace:/app/workspace
    working_dir: /app
