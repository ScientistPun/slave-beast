# 奴隶兽团队 - 单容器部署配置
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: slave-beast-redis
    # 端口映射
    ports:
      - "6379:6379"
    # Redis 配置
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --bind 0.0.0.0 --protected-mode no
    # 重启策略
    restart: unless-stopped

  slave-beast:
    build: .
    container_name: slave-beast
    # 端口映射
    ports:
      - "3000:3000"
    # 依赖 Redis
    depends_on:
      - redis
    # 保持容器后台运行
    tty: true
    stdin_open: true
    # 环境变量
    environment:
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # 防止 apt 安装过程中弹出交互式对话框
      - DEBIAN_FRONTEND=noninteractive
      - TZ=Asia/Shanghai
      # Agent 配置
      - LOCATION=广东广州
      - THINK_MODE=false
      # Redis 连接配置
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    # 启动命令 - 直接运行 start.sh，让它作为 PID 1
    command: tail -f /dev/null
    # 重启策略
    restart: unless-stopped
    # 挂载必要目录
    volumes:
      - ./logs:/app/logs
      - ./web:/app/web
      - ./workspace:/app/workspace
    working_dir: /app
