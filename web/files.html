<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件管理 - 奴隶兽团队</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --theme-primary: #6366F1;
      --theme-primary-dark: #4F46E5;
      --bg-main: #F3F4F6;
      --bg-card: #FFFFFF;
      --text-primary: #1F2937;
      --text-secondary: #6B7280;
      --text-light: #9CA3AF;
      --border: #E5E7EB;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 12px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ==================== 头部 ==================== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .header h1 {
      font-size: 1.2rem;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .back-btn {
      padding: 8px 16px;
      background: var(--theme-primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: var(--theme-primary-dark);
    }

    /* ==================== 上传区域 ==================== */
    .upload-area {
      background: var(--bg-card);
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .upload-area:hover {
      border-color: var(--theme-primary);
    }

    .upload-area.dragover {
      border-color: var(--theme-primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .upload-text {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .upload-text strong {
      color: var(--theme-primary);
    }

    .upload-hint {
      font-size: 0.75rem !important;
      margin-top: 6px;
      color: var(--text-light);
    }

    #fileInput {
      display: none;
    }

    /* ==================== 文件列表 ==================== */
    .file-list {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
    }

    .file-list-header {
      padding: 12px 16px;
      background: var(--bg-main);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      gap: 12px;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item:hover {
      background: var(--bg-main);
    }

    .file-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .file-icon.image {
      background: rgba(16, 185, 129, 0.1);
    }

    .file-icon.other {
      background: rgba(99, 102, 241, 0.1);
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-primary);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 0.75rem;
      color: var(--text-light);
    }

    .file-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .action-btn.download {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
    }

    .action-btn.download:hover {
      background: var(--success);
      color: white;
    }

    .action-btn.delete {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .action-btn.delete:hover {
      background: var(--danger);
      color: white;
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ==================== 预览弹窗 ==================== */
    .preview-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 10px;
    }

    .preview-modal.active {
      display: flex;
    }

    .preview-content {
      width: 100%;
      max-width: 1000px;
      max-height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .preview-content img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
    }

    .preview-content embed {
      width: 100%;
      height: 80vh;
      border-radius: 8px;
    }

    .preview-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .preview-filename {
      color: white;
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
      word-break: break-all;
      padding: 0 40px;
    }

    /* ==================== 空状态 ==================== */
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-light);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    /* ==================== 确认删除弹窗 ==================== */
    .confirm-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1001;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .confirm-modal.active {
      display: flex;
    }

    .confirm-content {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    .confirm-content h3 {
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .confirm-content p {
      color: var(--text-secondary);
      margin-bottom: 16px;
      font-size: 0.85rem;
      word-break: break-all;
    }

    .confirm-buttons {
      display: flex;
      gap: 10px;
    }

    .confirm-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .confirm-btn.cancel {
      background: var(--bg-main);
      color: var(--text-primary);
    }

    .confirm-btn.cancel:hover {
      background: var(--border);
    }

    .confirm-btn.danger {
      background: var(--danger);
      color: white;
    }

    .confirm-btn.danger:hover {
      background: #DC2626;
    }

    /* ==================== Toast 提示 ==================== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1002;
      max-width: 90%;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    /* ==================== 加载动画 ==================== */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--theme-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ==================== PC端适配 ==================== */
    @media (min-width: 768px) {
      body {
        padding: 20px;
      }

      .header {
        margin-bottom: 24px;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .back-btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }

      .upload-area {
        padding: 40px;
        margin-bottom: 24px;
      }

      .upload-icon {
        font-size: 3rem;
      }

      .upload-text {
        font-size: 0.95rem;
      }

      .upload-hint {
        font-size: 0.8rem !important;
        margin-top: 8px;
      }

      .file-list-header {
        padding: 16px 20px;
        font-size: 0.85rem;
      }

      .file-item {
        padding: 16px 20px;
        gap: 16px;
      }

      .file-icon {
        width: 48px;
        height: 48px;
        font-size: 1.5rem;
      }

      .file-name {
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .file-meta {
        font-size: 0.8rem;
      }

      .file-actions {
        gap: 8px;
      }

      .empty-state {
        padding: 60px 20px;
      }

      .empty-state .icon {
        font-size: 3rem;
      }

      .preview-content {
        max-width: 90%;
      }

      .preview-content embed {
        width: 80vw;
        height: 85vh;
      }

      .preview-filename {
        font-size: 0.9rem;
        margin-top: 16px;
      }

      .toast {
        padding: 12px 24px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" id="backBtn" onclick="goBack()">← 返回</button>
      <h1>📁 文件管理</h1>
    </div>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📤</div>
      <p class="upload-text">拖拽文件到此处，或 <strong>点击选择文件</strong></p>
      <p class="upload-text upload-hint">支持：JPG, PNG, GIF, WEBP, PDF, Markdowm</p>
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.gif,.webp,.md,.pdf" multiple>
    </div>

    <div class="file-list">
      <div class="file-list-header">共 <span id="fileCount">0</span> 个文件</div>
      <div id="fileListContent">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- 预览弹窗 -->
  <div class="preview-modal" id="previewModal">
    <button class="preview-close" onclick="closePreview()">×</button>
    <div class="preview-content" id="previewContent"></div>
    <div class="preview-filename" id="previewFilename"></div>
  </div>

  <!-- 确认删除弹窗 -->
  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-content">
      <h3>确认删除</h3>
      <p id="confirmMessage">确定要删除这个文件吗？</p>
      <div class="confirm-buttons">
        <button class="confirm-btn cancel" onclick="closeConfirm()">取消</button>
        <button class="confirm-btn danger" id="confirmDeleteBtn">删除</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script src="files.js"></script>
</body>
</html>
