<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奴隶兽团队 - 多Agent调度系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --theme-primary: #6366F1;
      --theme-primary-dark: #4F46E5;
      --theme-primary-light: #818CF8;

      --call-agent: #F59E0B;
      --agent-ceo: #EF4444;
      --agent-cto: #F59E0B;
      --agent-cro: #10B981;
      --agent-coo: #3B82F6;
      --agent-pm: #8B5CF6;
      --agent-qd: #EC4899;

      --status-idle: #22C55E;
      --status-processing: #3B82F6;
      --status-finish: #6B7280;
      --status-reject: #EF4444;
      --status-warning: #F59E0B;
      --status-error: #EF4444;

      --bg-main: #F3F4F6;
      --bg-card: #FFFFFF;
      --bg-header: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      --bg-input: #F9FAFB;
      --bg-hover: #F3F4F6;
      --bg-chat: #E8EAF6;

      --text-primary: #1F2937;
      --text-secondary: #6B7280;
      --text-light: #9CA3AF;

      --border: #E5E7EB;
      --bubble-user: #4F46E5;
      --bubble-agent: #FFFFFF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      display: flex;
      height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
      gap: 20px;
    }

    /* 左侧：聊天区域 */
    .chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* 头部 */
    .chat-header {
      padding: 20px 24px;
      background: var(--bg-header);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header-left {
      display: flex;
      flex-direction: column;
    }

    .chat-header-center {
      text-align: center;
    }

    .chat-header h1 {
      font-size: 1.35rem;
      font-weight: 600;
    }

    .chat-header p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .connection-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      padding: 4px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    .connection-dot.connected {
      background: #4ADE80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    /* 消息区域 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ====== 消息样式 ====== */

    /* 消息行 - 外层容器 */
    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    /* 用户消息：靠右，头像在右 */
    .message-row.user {
      flex-direction: row-reverse;
    }

    /* 头像容器 */
    .avatar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    /* 用户消息：用户名在头像下方 */
    .message-row.user .avatar-wrapper {
      align-items: flex-end;
    }

    /* 头像 */
    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* 消息容器 - 内层 */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      min-width: 80px;
    }

    /* 发送者名称 - 放在气泡上方 */
    .message .sender {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    /* 用户消息：发送者名称靠右 */
    .message-row.user .sender {
      text-align: right;
    }

    /* 各角色颜色 */
    .sender[data-role="ceo"] { color: var(--agent-ceo); }
    .sender[data-role="cto"] { color: var(--agent-cto); }
    .sender[data-role="cro"] { color: var(--agent-cro); }
    .sender[data-role="coo"] { color: var(--agent-coo); }
    .sender[data-role="pm"] { color: var(--agent-pm); }
    .sender[data-role="qd"] { color: var(--agent-qd); }

    /* 用户消息发送者 */
    .message-row.user .sender {
      color: rgba(255, 255, 255, 0.85);
    }

    /* 气泡 */
    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.9rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    /* Agent 气泡 - 白色 */
    .message-row.agent .message-bubble {
      background: var(--bubble-agent);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* 用户气泡 - 主题色 */
    .message-row.user .message-bubble {
      background: var(--bubble-user);
      color: white;
      border-top-right-radius: 4px;
    }

    /* 消息内容 */
    .message .content {
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* @指令消息高亮 */
    .message .content .at-mention {
      color: var(--call-agent);
      font-weight: 600;
      background: rgba(99, 102, 241, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* 时间戳 */
    .message .time {
      font-size: 0.6rem;
      color: var(--text-light);
      margin-top: 4px;
      padding: 0 4px;
    }

    .message-row.user .time {
      color: rgba(255, 255, 255, 0.7);
      text-align: right;
    }

    /* 系统消息 */
    .message-row.system {
      justify-content: center;
    }

    .message-row.system .message-bubble {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
    }

    /* 输入区域 */
    .chat-input-area {
      padding: 16px 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 25px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input:focus {
      border-color: var(--theme-primary);
      background: white;
    }

    .chat-input::placeholder {
      color: var(--text-light);
    }

    .send-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: var(--theme-primary);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .send-btn:hover {
      background: var(--theme-primary-dark);
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .at-hint {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 10px;
      padding-left: 8px;
    }

    /* 操作面板 */
    .operation-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-group.inline {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-group.inline .history-btn {
      flex: 1;
      min-width: 80px;
      justify-content: center;
      padding: 8px 12px;
      font-size: 0.8rem;
    }

    /* 弹窗样式 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-btn {
      padding: 0.4rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* 确认弹窗 */
    .confirm-modal .modal-content {
      min-width: 280px;
    }
    .confirm-modal .modal-btn.confirm {
      background: #EF4444 !important;
      color: white;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      min-width: 320px;
      max-width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .modal-content h3 {
      margin-bottom: 16px;
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }

    .log-item {
      padding: 12px 16px;
      background: var(--bg-input);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-item:hover {
      background: var(--theme-primary);
      color: white;
    }

    .log-item .log-name {
      font-weight: 600;
    }

    .log-item .log-size {
      font-size: 0.75rem;
      opacity: 0.7;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* 右侧：看板 */
    .kanban-section {
      width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kanban-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .kanban-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-primary);
    }

    /* Agent 列表 */
    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg-input);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .agent-item:hover {
      background: white;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.15);
      border-color: var(--theme-primary-light);
    }

    /* Agent 头像 */
    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* Agent 未上线状态 - 灰色头衔 */
    .agent-item.offline .agent-name {
      color: var(--text-light);
    }

    .agent-item.offline .agent-avatar {
      opacity: 0.5;
      filter: grayscale(100%);
    }

    .agent-item.offline .status-badge {
      background: rgba(156, 163, 175, 0.15);
      color: var(--text-light);
    }

    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .agent-task {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    /* 进度条 */
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--theme-primary) 0%, var(--theme-primary-light) 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .progress-bar.idle {
      background: var(--status-idle);
    }

    .progress-bar.processing {
      background: linear-gradient(90deg, var(--status-processing) 0%, #60A5FA 100%);
    }

    .progress-bar.finish {
      background: var(--status-finish);
    }

    .progress-bar.reject {
      background: var(--status-reject);
    }

    .agent-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.idle {
      background: rgba(34, 197, 94, 0.15);
      color: var(--status-idle);
    }

    .status-badge.processing,
    .status-badge.busy {
      background: rgba(59, 130, 246, 0.15);
      color: var(--status-processing);
    }

    .status-badge.finish {
      background: rgba(107, 114, 128, 0.15);
      color: var(--status-finish);
    }

    .status-badge.reject {
      background: rgba(239, 68, 68, 0.15);
      color: var(--status-reject);
    }

    .status-badge.error {
      background: rgba(239, 68, 68, 0.15);
      color: var(--status-error);
    }

    .status-badge.queued {
      background: rgba(245, 158, 11, 0.15);
      color: var(--status-warning);
    }

    .queue-count {
      font-size: 0.7rem;
      color: var(--text-light);
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-btn {
      padding: 14px 18px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-btn:hover {
      background: var(--theme-primary);
      color: white;
    }

    .history-btn.danger {
      border: 2px solid #FEE2E2;
      color: var(--status-error);
    }

    .history-btn.danger:hover {
      background: var(--status-error);
      color: white;
      border-color: var(--status-error);
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .container {
        flex-direction: column;
        padding: 10px;
        gap: 10px;
      }

      .chat-section {
        flex: 1;
        min-height: 60vh;
      }

      .kanban-section {
        width: 100%;
        flex-shrink: 0;
      }

      .message {
        max-width: 80%;
      }

      .message-bubble {
        font-size: 0.85rem;
        padding: 8px 12px;
      }

      .chat-header h1 {
        font-size: 1.1rem;
      }

      .btn-group.inline {
        flex-wrap: wrap;
      }

      .history-btn {
        padding: 10px 14px;
        font-size: 0.75rem;
      }
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Loading 动画 */
    .loading-row {
      justify-content: flex-start;
    }

    .loading-message {
      background: var(--bg-secondary);
      padding: 12px 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* 正在输入中气泡 */
    .typing-row {
      animation: fadeIn 0.2s ease;
    }

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
    }

    .typing-text {
      color: var(--text-secondary);
      font-size: 0.85rem;
      animation: textPulse 2s infinite ease-in-out;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--theme-primary);
      border-radius: 50%;
      animation: typingPulse 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typingPulse {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes textPulse {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左侧聊天区域 -->
    <div class="chat-section">
      <div class="chat-header">
        <div class="connection-status">
          <span class="connection-dot" id="connectionDot"></span>
          <span id="connectionText">连接中...</span>
        </div>
        <div class="chat-header-center">
          <h1>奴隶兽团队</h1>
        </div>
        <div style="width: 70px;"></div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <input
            type="text"
            class="chat-input"
            id="chatInput"
            placeholder="输入消息或@某个Agent分配任务..."
            autocomplete="off"
          >
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <!-- 操作面板放在输入框下方 -->
        <div class="operation-panel">
          <div class="btn-group inline">
            <button class="history-btn" id="loadHistoryBtn">📜 加载历史</button>
            <button class="history-btn danger" id="clearHistoryBtn">🗑️ 清空聊天</button>
            <button class="history-btn" id="clearAllLogsBtn">🧹 清空所有日志</button>
            <button class="history-btn" id="clearLogBtn">📄 清空指定日志</button>
            <button class="history-btn" id="fileManagerBtn">📁 文件管理</button>
          </div>
        </div>
        <div class="at-hint">提示：@包工头 @桥王 @天文台 @蛇头 @驴仔 @忍者神龟 可单独分配任务，或使用 @ceo 任务内容 格式</div>
      </div>
    </div>

    <!-- 右侧看板区域 -->
    <div class="kanban-section">
      <div class="kanban-card">
        <h2>Agent 状态看板</h2>
        <div class="agent-list" id="agentList"></div>
      </div>

      <div class="kanban-card">
        <h2>状态说明</h2>
        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem; color: var(--text-secondary);">
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="status-badge idle" style="font-size: 0.6rem;">空闲</span>
            <span>Agent处于空闲状态，可接收任务</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="status-badge processing" style="font-size: 0.6rem;">执行中</span>
            <span>Agent正在执行任务</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="status-badge finish" style="font-size: 0.6rem;">已完成</span>
            <span>Agent已完成任务</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="status-badge reject" style="font-size: 0.6rem;">已驳回</span>
            <span>Agent已驳回任务</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 日志选择弹窗 -->
    <div class="modal-overlay" id="logModal">
      <div class="modal-content">
        <h3>选择要清空的日志</h3>
        <div class="log-list" id="logList"></div>
        <div class="modal-buttons">
          <button class="history-btn" id="cancelLogBtn">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="index.js"></script>
</body>
</html>
