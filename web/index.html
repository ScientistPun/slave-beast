<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奴隶兽团队 - 多Agent调度系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --theme-primary: #6366F1;
      --theme-primary-dark: #4F46E5;
      --theme-primary-light: #818CF8;

      --agent-ceo: #EF4444;
      --agent-cto: #F59E0B;
      --agent-cro: #10B981;
      --agent-coo: #3B82F6;
      --agent-pm: #8B5CF6;
      --agent-qd: #EC4899;

      --status-success: #22C55E;
      --status-warning: #F59E0B;
      --status-error: #EF4444;

      --bg-main: #F3F4F6;
      --bg-card: #FFFFFF;
      --bg-header: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      --bg-input: #F9FAFB;
      --bg-hover: #F3F4F6;
      --bg-chat: #E8EAF6;

      --text-primary: #1F2937;
      --text-secondary: #6B7280;
      --text-light: #9CA3AF;

      --border: #E5E7EB;
      --bubble-user: #4F46E5;
      --bubble-agent: #FFFFFF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      display: flex;
      height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
      gap: 20px;
    }

    /* 左侧：聊天区域 */
    .chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* 头部 */
    .chat-header {
      padding: 20px 24px;
      background: var(--bg-header);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header-left {
      display: flex;
      flex-direction: column;
    }

    .chat-header h1 {
      font-size: 1.35rem;
      font-weight: 600;
    }

    .chat-header p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .connection-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      padding: 4px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    .connection-dot.connected {
      background: #4ADE80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    /* 消息区域 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg-chat);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ====== 消息样式 ====== */

    /* 消息行 - 外层容器 */
    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    /* 用户消息：靠右，头像在右 */
    .message-row.user {
      flex-direction: row-reverse;
    }

    /* 头像容器 */
    .avatar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    /* 用户消息：用户名在头像下方 */
    .message-row.user .avatar-wrapper {
      align-items: flex-end;
    }

    /* 头像 */
    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* 消息容器 - 内层 */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      min-width: 80px;
    }

    /* 发送者名称 - 放在气泡上方 */
    .message .sender {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    /* 用户消息：发送者名称靠右 */
    .message-row.user .sender {
      text-align: right;
    }

    /* 各角色颜色 */
    .sender[data-role="ceo"] { color: var(--agent-ceo); }
    .sender[data-role="cto"] { color: var(--agent-cto); }
    .sender[data-role="cro"] { color: var(--agent-cro); }
    .sender[data-role="coo"] { color: var(--agent-coo); }
    .sender[data-role="pm"] { color: var(--agent-pm); }
    .sender[data-role="qd"] { color: var(--agent-qd); }

    /* 用户消息发送者 */
    .message-row.user .sender {
      color: rgba(255, 255, 255, 0.85);
    }

    /* 气泡 */
    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.9rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    /* Agent 气泡 - 白色 */
    .message-row.agent .message-bubble {
      background: var(--bubble-agent);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* 用户气泡 - 主题色 */
    .message-row.user .message-bubble {
      background: var(--bubble-user);
      color: white;
      border-top-right-radius: 4px;
    }

    /* 消息内容 */
    .message .content {
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* 时间戳 */
    .message .time {
      font-size: 0.6rem;
      color: var(--text-light);
      margin-top: 4px;
      padding: 0 4px;
    }

    .message-row.user .time {
      color: rgba(255, 255, 255, 0.7);
      text-align: right;
    }

    /* 系统消息 */
    .message-row.system {
      justify-content: center;
    }

    .message-row.system .message-bubble {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 8px 16px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
    }

    /* 输入区域 */
    .chat-input-area {
      padding: 16px 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
    }

    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 25px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input:focus {
      border-color: var(--theme-primary);
      background: white;
    }

    .chat-input::placeholder {
      color: var(--text-light);
    }

    .send-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: var(--theme-primary);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .send-btn:hover {
      background: var(--theme-primary-dark);
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .at-hint {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 10px;
      padding-left: 8px;
    }

    /* 右侧：看板 */
    .kanban-section {
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kanban-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .kanban-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-primary);
    }

    /* Agent 列表 */
    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .agent-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg-input);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .agent-item:hover {
      background: white;
      box-shadow: 0 2px 12px rgba(99, 102, 241, 0.15);
    }

    /* Agent 头像 */
    .agent-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* Agent 未上线状态 - 灰色头衔 */
    .agent-item.offline .agent-name {
      color: var(--text-light);
    }

    .agent-item.offline .agent-avatar {
      opacity: 0.5;
      filter: grayscale(100%);
    }

    .agent-item.offline .status-badge {
      background: rgba(156, 163, 175, 0.15);
      color: var(--text-light);
    }

    .agent-info {
      flex: 1;
      min-width: 0;
    }

    .agent-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 2px;
      color: var(--text-primary);
    }

    .agent-task {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.idle {
      background: rgba(34, 197, 94, 0.15);
      color: #16A34A;
    }

    .status-badge.processing,
    .status-badge.busy {
      background: rgba(245, 158, 11, 0.15);
      color: #D97706;
    }

    .status-badge.finish {
      background: rgba(34, 197, 94, 0.15);
      color: #16A34A;
    }

    .status-badge.reject {
      background: rgba(239, 68, 68, 0.15);
      color: #DC2626;
    }

    .status-badge.error {
      background: rgba(239, 68, 68, 0.15);
      color: #DC2626;
    }

    .status-badge.queued {
      background: rgba(59, 130, 246, 0.15);
      color: #2563EB;
    }

    .queue-count {
      font-size: 0.7rem;
      color: var(--text-light);
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-btn {
      padding: 14px 18px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-btn:hover {
      background: var(--theme-primary);
      color: white;
    }

    .history-btn.danger {
      border: 2px solid #FEE2E2;
      color: var(--status-error);
    }

    .history-btn.danger:hover {
      background: var(--status-error);
      color: white;
      border-color: var(--status-error);
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .container {
        flex-direction: column;
        padding: 10px;
      }

      .kanban-section {
        width: 100%;
      }

      .message {
        max-width: 80%;
      }
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 左侧聊天区域 -->
    <div class="chat-section">
      <div class="chat-header">
        <div class="chat-header-left">
          <h1>奴隶兽团队</h1>
          <p>多Agent智能任务调度系统</p>
        </div>
        <div class="connection-status">
          <span class="connection-dot" id="connectionDot"></span>
          <span id="connectionText">连接中...</span>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <input
            type="text"
            class="chat-input"
            id="chatInput"
            placeholder="输入消息或@某个Agent分配任务..."
            autocomplete="off"
          >
          <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div class="at-hint">提示：@包工头 @桥王 @天文台 @蛇头 @驴仔 @忍者神龟 可单独分配任务</div>
      </div>
    </div>

    <!-- 右侧看板区域 -->
    <div class="kanban-section">
      <div class="kanban-card">
        <h2>Agent 状态</h2>
        <div class="agent-list" id="agentList"></div>
      </div>

      <div class="kanban-card">
        <h2>操作</h2>
        <div class="btn-group">
          <button class="history-btn" id="loadHistoryBtn">📜 加载历史记录</button>
          <button class="history-btn danger" id="clearHistoryBtn">🗑️ 清空聊天记录</button>
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
